<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日读书笔记 · 目录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cream: #f5efe0;
  --paper: #fdfaf2;
  --ink: #2c2416;
  --ink-soft: #5c4f3e;
  --ink-faded: #8a7c68;
  --bookmark: #9e2b25;
  --gold: #b8860b;
  --border: #d8ccb6;
  --serif-cn: 'Noto Serif SC', 'Songti SC', serif;
  --serif-en: 'Cormorant Garamond', serif;
}
html { scroll-behavior: smooth; font-size: 17px; }
body {
  font-family: var(--serif-cn);
  background: var(--cream);
  color: var(--ink);
  line-height: 1.85;
  min-height: 100vh;
}
.header {
  text-align: center;
  padding: 3rem 2rem 1.5rem;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
.header .subtitle { color: var(--ink-soft); font-size: 1.1rem; margin-bottom: 0.8rem; }
.header .stats { color: var(--gold); font-size: 1rem; font-weight: 500; }

/* Category Filter */
.filter-bar {
  position: sticky;
  top: 0;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.filter-inner {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
}
.filter-btn {
  padding: 0.4rem 1rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--ink-soft);
  font-family: var(--serif-cn);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover {
  background: var(--cream);
  border-color: var(--gold);
  color: var(--ink);
}
.filter-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.filter-btn .count {
  font-size: 0.75rem;
  opacity: 0.7;
  margin-left: 0.3rem;
}

/* Search */
.search-box {
  max-width: 900px;
  margin: 1.5rem auto;
  padding: 0 2rem;
}
.search-box input {
  width: 100%;
  padding: 0.7rem 1.2rem;
  font-family: var(--serif-cn);
  font-size: 1rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: white;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--gold); }
.search-box input::placeholder { color: var(--ink-faded); }

/* Container */
.container { max-width: 900px; margin: 0 auto; padding: 1rem 2rem 4rem; }

/* Category Section */
.category-section { margin-bottom: 2.5rem; }
.category-title {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 1rem;
  padding-bottom: 0.4rem;
  border-bottom: 2px solid var(--gold);
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
}
.category-title .icon { font-size: 1.3rem; }
.category-title .count {
  font-size: 0.9rem;
  color: var(--ink-faded);
  font-weight: 400;
}

/* Book Grid */
.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}
.book-card {
  background: white;
  border-radius: 8px;
  padding: 1rem 1.2rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: transform 0.2s, box-shadow 0.2s;
  border-left: 3px solid var(--gold);
  text-decoration: none;
  color: inherit;
  display: block;
}
.book-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  border-left-color: var(--bookmark);
}
.book-card .book-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 0.2rem;
}
.book-card .book-author {
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin-bottom: 0.4rem;
}
.book-card .book-date {
  font-size: 0.8rem;
  color: var(--ink-faded);
  font-family: var(--serif-en);
}
.book-card .book-tags {
  margin-top: 0.4rem;
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}
.book-card .tag {
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  background: var(--cream);
  color: var(--ink-soft);
  border-radius: 3px;
}

/* No Results */
.no-results {
  text-align: center;
  padding: 3rem;
  color: var(--ink-faded);
  font-size: 1.1rem;
  display: none;
}

/* Footer */
.footer {
  text-align: center;
  padding: 2rem;
  color: var(--ink-faded);
  font-size: 0.9rem;
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}

@media (max-width: 768px) {
  .header h1 { font-size: 2rem; }
  .category-title { font-size: 1.3rem; }
  .book-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <h1>每日读书笔记</h1>
  <p class="subtitle">Reading Notes Collection</p>
  <p class="stats">共 <span id="total-count">0</span> 篇读书笔记</p>
</header>

<div class="filter-bar">
  <div class="filter-inner" id="filter-bar">
    <!-- 动态生成 -->
  </div>
</div>

<div class="search-box">
  <input type="text" id="search-input" placeholder="搜索书名、作者、标签...">
</div>

<main class="container" id="content">
  <!-- 动态生成 -->
</main>

<div class="no-results" id="no-results">没有找到匹配的笔记</div>

<footer class="footer">
  <p>每日读书笔记 · 持续更新中</p>
</footer>

-06-30", "slug": "20260630", "title": "存在与时间", "author": "海德格尔", "tags": ["此在", "在世存在", "向死而生"], "category": "哲学·思想"}, {"date": "2026-07-01", "slug": "20260701", "title": "失控", "author": "凯文·凯利", "tags": ["涌现", "自组织", "分布式"], "category": "科学·历史"}, {"date": "2026-07-02", "slug": "20260702", "title": "创新者的窘境", "author": "克莱顿·克里斯坦森", "tags": ["破坏性创新", "价值网络", "组织能力"], "category": "商业·投资"}, {"date": "2026-07-03", "slug": "20260703", "title": "象与骑象人", "author": "乔纳森·海特", "tags": ["象与骑象人", "道德基础", "幸福假设"], "category": "心理学"}, {"date": "2026-07-04", "slug": "20260704", "title": "思考，快与慢", "author": "丹尼尔·卡尼曼", "tags": ["双系统理论", "认知偏差", "决策"], "category": "心理学"}, {"date": "2026-07-05", "slug": "20260705", "title": "被讨厌的勇气", "author": "岸见一郎 / 古贺史健", "tags": ["阿德勒心理学", "课题分离", "自我接纳"], "category": "心理学"}, {"date": "2026-07-06", "slug": "20260706", "title": "心流", "author": "米哈里·契克森米哈赖", "tags": ["最优体验", "内在动机", "专注力"], "category": "心理学"}, {"date": "2026-07-07", "slug": "20260707", "title": "人类简史", "author": "尤瓦尔·赫拉利", "tags": ["认知革命", "虚构故事", "人类命运"], "category": "科学·历史"}, {"date": "2026-07-08", "slug": "20260708", "title": "刻意练习", "author": "安德斯·艾利克森 / 罗伯特·普尔", "tags": ["心理表征", "刻意练习", "专家之路"], "category": "个人成长"}, {"date": "2026-07-09", "slug": "20260709", "title": "关键在于不在乎", "author": "马克·曼森", "tags": ["价值排序", "选择焦虑", "反鸡汤"], "category": "心理学"}, {"date": "2026-07-10", "slug": "20260710", "title": "少有人走的路", "author": "M·斯科特·派克", "tags": ["自律", "心智成熟", "爱的定义"], "category": "心理学"}, {"date": "2026-07-11", "slug": "20260711", "title": "非暴力沟通", "author": "马歇尔·卢森堡", "tags": ["观察与评判", "需求", "同理心"], "category": "心理学"}, {"date": "2026-07-12", "slug": "20260712", "title": "存在与时间", "author": "海德格尔", "tags": ["此在", "向死而生", "时间性"], "category": "哲学·思想"}, {"date": "2026-07-13", "slug": "20260713", "title": "舞蹈形体训练基础", "author": "李正一", "tags": ["形体训练", "舞蹈基础", "身体控制"], "category": "形体"}, {"date": "2026-07-14", "slug": "20260714", "title": "芭蕾形体与身体美学", "author": "玛丽·克拉克 (Mary Clarke)", "tags": ["芭蕾美学", "身体语言", "优雅气质"], "category": "形体"}, {"date": "2026-07-15", "slug": "20260715", "title": "形体艺术表达：从技术到表现", "author": "王玫", "tags": ["形体表达", "现代舞", "身体语言"], "category": "形体"}, {"date": "2026-07-16", "slug": "20260716", "title": "体态评估与治疗", "author": "菲尔·佩哲 (Phil Page)", "tags": ["体态矫正", "康复训练", "肌肉平衡"], "category": "体态改善"}, {"date": "2026-07-17", "slug": "20260717", "title": "脊柱健康全书", "author": "斯图尔特·麦吉尔 (Stuart McGill)", "tags": ["脊柱保护", "核心稳定", "运动医学"], "category": "体态改善"}, {"date": "2026-07-18", "slug": "20260718", "title": "姿势矫正：功能训练指南", "author": "贾斯汀·普莱斯 (Justin Price)", "tags": ["姿势矫正", "功能训练", "疼痛管理"], "category": "体态改善"}];

const categoryIcons = {
  '心理学': '🧠',
  '思维方法': '💡',
  '个人成长': '',
  '商业·投资': '💼',
  '哲学·思想': '📜',
  '科学·历史': '🔬',
  '写作·表达': '✍️',
  '形体': '🩰',
  '体态改善': '🧘',
  '其他': '📚'
}

const categoryOrder = ['心理学', '思维方法', '个人成长', '形体', '体态改善', '商业·投资', '哲学·思想', '科学·历史', '写作·表达']

let currentCategory = 'all'

function groupByCategory(notesList) {
  const groups = {}
  notesList.forEach(note => {
    const cat = note.category || '其他'
    if (!groups[cat]) groups[cat] = []
    groups[cat].push(note)
  })
  // Sort within each category by date
  Object.values(groups).forEach(arr => arr.sort((a, b) => a.date.localeCompare(b.date)))
  return groups
}

function renderFilterBar(notesList) {
  const bar = document.getElementById('filter-bar')
  const groups = groupByCategory(notesList)
  
  let html = `<button class="filter-btn active" data-cat="all">全部<span class="count">${notesList.length}</span></button>`
  
  categoryOrder.forEach(cat => {
    if (groups[cat] && groups[cat].length > 0) {
      const icon = categoryIcons[cat] || '📚'
      html += `<button class="filter-btn" data-cat="${cat}">${icon} ${cat}<span class="count">${groups[cat].length}</span></button>`
    }
  })
  
  bar.innerHTML = html
  
  // Bind click events
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      currentCategory = btn.dataset.cat
      renderContent(notesList)
    })
  })
}

function renderContent(notesList) {
  const content = document.getElementById('content')
  const searchQuery = document.getElementById('search-input').value.toLowerCase().trim()
  
  // Filter by search
  let filtered = notesList
  if (searchQuery) {
    filtered = notesList.filter(n => 
      n.title.toLowerCase().includes(searchQuery) ||
      n.author.toLowerCase().includes(searchQuery) ||
      (n.tags && n.tags.some(t => t.toLowerCase().includes(searchQuery)))
    )
  }
  
  // Filter by category
  if (currentCategory !== 'all') {
    filtered = filtered.filter(n => n.category === currentCategory)
  }
  
  if (filtered.length === 0) {
    content.innerHTML = ''
    document.getElementById('no-results').style.display = 'block'
    return
  }
  
  document.getElementById('no-results').style.display = 'none'
  
  const groups = groupByCategory(filtered)
  
  let html = ''
  categoryOrder.forEach(cat => {
    if (groups[cat] && groups[cat].length > 0) {
      const icon = categoryIcons[cat] || '📚'
      html += `
        <section class="category-section">
          <h2 class="category-title">
            <span class="icon">${icon}</span>
            ${cat}
            <span class="count">${groups[cat].length}本</span>
          </h2>
          <div class="book-grid">
            ${groups[cat].map(note => `
              <a class="book-card" href="${note.slug}/">
                <div class="book-title">《${note.title}》</div>
                <div class="book-author">${note.author}</div>
                <div class="book-date">${note.date}</div>
                ${note.tags ? `<div class="book-tags">${note.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
              </a>
            `).join('')}
          </div>
        </section>
      `
    }
  })
  
  content.innerHTML = html
}

// Search
document.getElementById('search-input').addEventListener('input', () => {
  renderContent(notes)
})

// Initial render
document.getElementById('total-count').textContent = notes.length
renderFilterBar(notes)
renderContent(notes)
</script>

</body>
