<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日读书笔记 · 目录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cream: #f5efe0;
  --cream-light: #faf6ec;
  --paper: #fdfaf2;
  --ink: #2c2416;
  --ink-soft: #5c4f3e;
  --ink-faded: #8a7c68;
  --bookmark: #9e2b25;
  --gold: #b8860b;
  --gold-soft: #c9a84c;
  --border: #d8ccb6;
  --border-soft: #e8dfca;
  --serif-cn: 'Noto Serif SC', 'Songti SC', serif;
  --serif-en: 'Cormorant Garamond', serif;
}
html { scroll-behavior: smooth; font-size: 17px; }
body {
  font-family: var(--serif-cn);
  background: var(--cream);
  color: var(--ink);
  line-height: 1.85;
  min-height: 100vh;
}

/* Header */
.header {
  text-align: center;
  padding: 3rem 2rem 2rem;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 2.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}
.header .subtitle {
  color: var(--ink-soft);
  font-size: 1.1rem;
  margin-bottom: 1rem;
}
.header .stats {
  color: var(--gold);
  font-size: 1rem;
  font-weight: 500;
}

/* Month Navigation */
.month-nav {
  position: sticky;
  top: 0;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.month-nav a {
  text-decoration: none;
  color: var(--ink-soft);
  padding: 0.5rem 1.2rem;
  border-radius: 6px;
  font-size: 0.95rem;
  transition: all 0.2s;
  border: 1px solid transparent;
}
.month-nav a:hover {
  background: var(--cream);
  color: var(--ink);
  border-color: var(--border);
}

/* Search Box */
.search-box {
  max-width: 600px;
  margin: 2rem auto;
  padding: 0 2rem;
}
.search-box input {
  width: 100%;
  padding: 0.8rem 1.2rem;
  font-family: var(--serif-cn);
  font-size: 1rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: white;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus {
  border-color: var(--gold);
}
.search-box input::placeholder {
  color: var(--ink-faded);
}

/* Container */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 2rem 4rem;
}

/* Month Section */
.month-section {
  margin-bottom: 3rem;
}
.month-title {
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 1.5rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--gold);
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
}
.month-title .count {
  font-size: 1rem;
  color: var(--ink-faded);
  font-weight: 400;
}

/* Note List */
.note-list {
  list-style: none;
  display: grid;
  gap: 1rem;
}
.note-item {
  background: white;
  border-radius: 8px;
  padding: 1.2rem 1.5rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: transform 0.2s, box-shadow 0.2s;
  border-left: 3px solid var(--gold);
}
.note-item:hover {
  transform: translateX(4px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  border-left-color: var(--bookmark);
}
.note-item a {
  text-decoration: none;
  color: inherit;
  display: flex;
  align-items: baseline;
  gap: 1rem;
}
.note-date {
  font-size: 0.9rem;
  color: var(--ink-faded);
  min-width: 100px;
  font-family: var(--serif-en);
}
.note-info {
  flex: 1;
}
.note-title {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 0.2rem;
}
.note-author {
  font-size: 0.9rem;
  color: var(--ink-soft);
}

/* No Results */
.no-results {
  text-align: center;
  padding: 3rem;
  color: var(--ink-faded);
  font-size: 1.1rem;
  display: none;
}

/* Footer */
.footer {
  text-align: center;
  padding: 2rem;
  color: var(--ink-faded);
  font-size: 0.9rem;
  border-top: 1px solid var(--border);
  margin-top: 3rem;
}

/* Responsive */
@media (max-width: 768px) {
  .header h1 { font-size: 2rem; }
  .month-title { font-size: 1.5rem; }
  .note-item a { flex-direction: column; gap: 0.3rem; }
  .note-date { min-width: auto; }
}
</style>
</head>
<body>

<header class="header">
  <h1>每日读书笔记</h1>
  <p class="subtitle">Reading Notes Collection</p>
  <p class="stats">共 <span id="total-count">0</span> 篇读书笔记</p>
</header>

<nav class="month-nav" id="month-nav">
  <!-- 动态生成 -->
</nav>

<div class="search-box">
  <input type="text" id="search-input" placeholder="搜索书名、作者...">
</div>

<main class="container" id="content">
  <!-- 动态生成 -->
</main>

<div class="no-results" id="no-results">没有找到匹配的笔记</div>

<footer class="footer">
  <p>每日读书笔记 · 持续更新中</p>

// 按月份分组
function groupByMonth(notes) {
  const groups = {};
  notes.forEach(note => {
    const month = note.date.substring(0, 7); // YYYY-MM
    if (!groups[month]) groups[month] = [];
    groups[month].push(note);
  });
  return groups;
}

// 格式化月份显示
function formatMonth(monthStr) {
  const [year, month] = monthStr.split('-');
  return `${year}年${parseInt(month)}月`;
}

// 格式化日期显示
function formatDate(dateStr) {
  const [, month, day] = dateStr.split('-');
  return `${parseInt(month)}月${parseInt(day)}日`;
}

// 渲染目录
function render(notesToRender) {
  const content = document.getElementById('content');
  const monthNav = document.getElementById('month-nav');
  const groups = groupByMonth(notesToRender);
  
  // 更新总数
  document.getElementById('total-count').textContent = notesToRender.length;
  
  // 生成月份导航
  const months = Object.keys(groups).sort((a, b) => b.localeCompare(a));
  monthNav.innerHTML = months.map(m => 
    `<a href="#${m}">${formatMonth(m)}</a>`
  ).join('');
  
  // 生成内容
  if (notesToRender.length === 0) {
    content.innerHTML = '';
    document.getElementById('no-results').style.display = 'block';
    return;
  }
  
  document.getElementById('no-results').style.display = 'none';
  
  content.innerHTML = months.map(month => {
    const monthNotes = groups[month].sort((a, b) => b.date.localeCompare(a.date));
    return `
      <section class="month-section" id="${month}">
        <h2 class="month-title">
          ${formatMonth(month)}
          <span class="count">${monthNotes.length}篇</span>
        </h2>
        <ul class="note-list">
          ${monthNotes.map(note => `
            <li class="note-item">
              <a href="${note.slug}/">
                <span class="note-date">${formatDate(note.date)}</span>
                <div class="note-info">
                  <div class="note-title">《${note.title}》</div>
                  <div class="note-author">${note.author}</div>
                </div>
              </a>
            </li>
          `).join('')}
        </ul>
      </section>
    `;
  }).join('');
}

// 搜索功能
document.getElementById('search-input').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase().trim();
  if (!query) {
    render(notes);
    return;
  }
  const filtered = notes.filter(n => 
    n.title.toLowerCase().includes(query) ||
    n.author.toLowerCase().includes(query) ||
    n.tags.some(t => t.toLowerCase().includes(query))
  );
  render(filtered);
});

// 初始渲染
render(notes);
</script>
