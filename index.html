<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日读书笔记 - Daily Book Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cream: #f5efe0;
  --paper: #fdfaf2;
  --ink: #2c2416;
  --ink-soft: #5c4f3e;
  --ink-faded: #8a7c68;
  --bookmark: #9e2b25;
  --gold: #b8860b;
  --border: #d8ccb6;
  --serif: 'Noto Serif SC', serif;
  --sans: 'Noto Sans SC', sans-serif;
}
body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  line-height: 1.7;
  min-height: 100vh;
}
.header {
  text-align: center;
  padding: 3rem 1rem 2rem;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-family: var(--serif);
  font-weight: 900;
  font-size: 2rem;
  letter-spacing: 0.05em;
}
.header p {
  font-family: var(--serif);
  font-style: italic;
  color: var(--ink-faded);
  margin-top: 0.5rem;
  font-size: 0.9rem;
}
.stats {
  display: flex;
  justify-content: center;
  gap: 2rem;
  margin-top: 1rem;
  font-size: 0.85rem;
  color: var(--ink-faded);
}
.stats span strong {
  color: var(--bookmark);
  font-family: var(--serif);
  font-size: 1.2rem;
}
.grid {
  max-width: 900px;
  margin: 2rem auto;
  padding: 0 1.5rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.2rem;
}
.card {
  display: block;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.3rem;
  text-decoration: none;
  color: var(--ink);
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(92,79,62,0.12);
  border-color: var(--gold);
}
.card-date {
  font-size: 0.75rem;
  color: var(--ink-faded);
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
}
.card-title {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 1.15rem;
  margin-bottom: 0.3rem;
  line-height: 1.4;
}
.card-author {
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin-bottom: 0.6rem;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.card-tags span {
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  background: rgba(184,134,11,0.08);
  border: 1px solid rgba(184,134,11,0.15);
  border-radius: 100px;
  color: var(--gold);
}
.footer {
  text-align: center;
  padding: 2rem 1rem;
  font-size: 0.8rem;
  color: var(--ink-faded);
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}
@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 1.6rem; }
}
</style>
</head>
<body>
  <header class="header">

    <div class="stats">

    </div>
  </header>

          <div class="card-tags">

          </div>

          <p class="card-author">丹尼尔·卡尼曼</p>
          <div class="card-tags">

  </main>
  <footer class="footer">
    <p>Powered by Hermes AI · Updated 2026-07-11</p>
  </footer>
</body>
</html>
